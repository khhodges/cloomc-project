<h1>Figure 7 &mdash; LAMBDA Clamp: Macro-Like Code Reuse</h1>
<p class="subtitle">Clamp function exists once in memory, invoked three times (R, G, B channels) via LAMBDA. Zero stack access per invocation — machine-status fast path throughout.</p>

  <!-- ========== KEY INSIGHT ========== -->

  <rect x="30" y="1075" width="940" height="200" rx="10" fill="#0f1520" stroke="#f5c842" stroke-width="1.5"/>
  <text class="ph" x="500" y="1100" text-anchor="middle" fill="#f5c842">KEY INSIGHTS</text>

  <text class="lt" x="60" y="1130" fill="#2ecc71" font-size="13" font-weight="bold">Macro-like reuse without duplication:</text>
  <text class="lt" x="60" y="1150" fill="#a0b0c0" font-size="12">The clamp code exists once in memory. LAMBDA jumps to it via X permission on the GT.</text>
  <text class="lt" x="60" y="1168" fill="#a0b0c0" font-size="12">Unlike a macro, the code is not copied at each call site. Unlike CALL, there is no stack overhead.</text>

  <text class="lt" x="60" y="1198" fill="#5dade2" font-size="13" font-weight="bold">Machine-status fast path:</text>
  <text class="lt" x="60" y="1218" fill="#a0b0c0" font-size="12">LAMBDA saves PC+4 to a machine-status register (not the stack). RETURN checks the LAMBDA-active</text>
  <text class="lt" x="60" y="1236" fill="#a0b0c0" font-size="12">flag and restores directly — zero memory access. Three invocations = zero stack operations.</text>

  <text class="lt" x="60" y="1260" fill="#c39bd3" font-size="13" font-weight="bold">Security preserved:</text>
  <text class="lt" x="60" y="1278" fill="#a0b0c0" font-size="12">Each invocation still checks X permission on CR2. The GT governs access — no bypass, no escalation.</text>

  <!-- visual: 3 arrows pointing to one code block -->
