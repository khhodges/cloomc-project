  <text class="ph" x="550" y="1265" text-anchor="middle" fill="#f5c842">KEY INSIGHTS</text>

  <text class="lt" x="50" y="1295" fill="#f5c842" font-size="13" font-weight="bold">Same caller interface, three internal mechanisms:</text>
  <text class="lt" x="50" y="1315" fill="#555555" font-size="12">The caller always writes CALL(Abstraction.Method(args)). The CALL ceremony switches CR6 and CR14 identically</text>
  <text class="lt" x="50" y="1333" fill="#555555" font-size="12">in all three cases. What differs is how CR14 resolves the method name to executable code. The caller never</text>
  <text class="lt" x="50" y="1351" fill="#555555" font-size="12">knows which style is used — that's the power of encapsulation through capabilities.</text>

  <text class="lt" x="50" y="1381" fill="#2ecc71" font-size="13" font-weight="bold">LAMBDA is unique — it eliminates the CALL/RETURN overhead within a domain:</text>
  <text class="lt" x="50" y="1401" fill="#555555" font-size="12">While (a) and (c) both use the full CALL ceremony (stack push, mLoad revalidation on RETURN), LAMBDA</text>
  <text class="lt" x="50" y="1419" fill="#555555" font-size="12">saves the return address to a machine-status register and restores it in 1 cycle. Zero stack, zero mLoad.</text>

  <text class="lt" x="50" y="1449" fill="#c39bd3" font-size="13" font-weight="bold">Abstraction creator chooses the tradeoff:</text>
  <text class="lt" x="50" y="1469" fill="#555555" font-size="12">High-security services (Mint, crypto) use symbolic dispatch for maximum isolation. Compute utilities use</text>
  <text class="lt" x="50" y="1487" fill="#555555" font-size="12">LAMBDA for speed. General code uses traditional binaries. Different abstractions in the same system can mix styles.</text>
