<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 6: Lambda Calculus to CTMM Hardware Mapping</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #c8d6e5;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 { font-size: 22px; color: #f5c842; margin-bottom: 6px; text-align: center; }
  .subtitle { font-size: 13px; color: #8899aa; margin-bottom: 30px; text-align: center; max-width: 700px; }
</style>
</head>
<body>

<h1>Figure 6 &mdash; Lambda Calculus to CTMM Hardware Mapping</h1>
<p class="subtitle">How Church's lambda calculus concepts map directly to CTMM hardware elements via the LAMBDA instruction</p>

<svg viewBox="0 0 980 920" width="980" height="920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5dade2"/>
    </marker>
    <marker id="ah-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
    <marker id="ah-y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5c842"/>
    </marker>
  </defs>

  <style>
    .hdr { font-family:'Segoe UI',system-ui,sans-serif; font-size:15px; font-weight:700; fill:#f5c842; text-anchor:middle; }
    .col-hdr { font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; font-weight:700; text-anchor:middle; dominant-baseline:central; }
    .cell { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; fill:#c8d6e5; text-anchor:middle; dominant-baseline:central; }
    .cell-s { font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; fill:#a0b0c0; text-anchor:middle; dominant-baseline:central; }
    .cell-b { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; fill:#e8e8e8; font-weight:700; text-anchor:middle; dominant-baseline:central; }
    .mono { font-family:'Consolas','Courier New',monospace; }
    .note { font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; fill:#8899aa; text-anchor:start; }
    .ph { font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; font-weight:700; }
  </style>

  <!-- ========== MAIN TABLE ========== -->

  <!-- Table header row -->
  <rect x="30" y="20" width="920" height="40" rx="8" fill="#141a28" stroke="#2a3a4a" stroke-width="1.5"/>
  <text class="col-hdr" x="110" y="40" fill="#c39bd3">Lambda Calculus</text>
  <text class="col-hdr" x="280" y="40" fill="#8899aa">Notation</text>
  <text class="col-hdr" x="450" y="40" fill="#5dade2">CTMM Hardware</text>
  <text class="col-hdr" x="650" y="40" fill="#2ecc71">Permission/Domain</text>
  <text class="col-hdr" x="850" y="40" fill="#f39c12">Cycle Cost</text>

  <!-- Divider -->
  <line x1="30" y1="62" x2="950" y2="62" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Row 1: Abstraction → GT with X permission -->
  <rect x="30" y="65" width="920" height="80" rx="0" fill="#0f1520" stroke="#1a2a3a" stroke-width="0.5"/>

  <rect x="50" y="78" width="120" height="40" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="cell-b" x="110" y="93" fill="#c39bd3">Abstraction</text>
  <text class="cell-s" x="110" y="108" fill="#c39bd3">(&#955;x.body)</text>

  <text class="cell mono" x="280" y="98" fill="#c39bd3">&#955;x.M</text>
  <text class="cell-s" x="280" y="116" fill="#8899aa">"bind x in body M"</text>

  <rect x="375" y="78" width="150" height="40" rx="6" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="cell-b" x="450" y="93" fill="#5dade2">Golden Token</text>
  <text class="cell-s" x="450" y="108" fill="#5dade2">in CRn (X perm)</text>

  <text class="cell" x="650" y="93" fill="#2ecc71">X (Execute)</text>
  <text class="cell-s" x="650" y="110" fill="#6a8a6a">Turing domain</text>

  <text class="cell" x="850" y="98" fill="#f39c12">0 cycles</text>
  <text class="cell-s" x="850" y="116" fill="#8899aa">GT already loaded</text>

  <!-- Arrow connecting -->
  <line x1="170" y1="98" x2="220" y2="98" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="330" y1="98" x2="375" y2="98" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Row 2: Variable → Data Register (argument) -->
  <rect x="30" y="150" width="920" height="80" rx="0" fill="#0d1220" stroke="#1a2a3a" stroke-width="0.5"/>

  <rect x="50" y="163" width="120" height="40" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="cell-b" x="110" y="178" fill="#c39bd3">Variable</text>
  <text class="cell-s" x="110" y="193" fill="#c39bd3">(x)</text>

  <text class="cell mono" x="280" y="183" fill="#c39bd3">x</text>
  <text class="cell-s" x="280" y="201" fill="#8899aa">"bound parameter"</text>

  <rect x="375" y="163" width="150" height="40" rx="6" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="cell-b" x="450" y="178" fill="#5dade2">Data Register</text>
  <text class="cell-s" x="450" y="193" fill="#5dade2">DRn (argument)</text>

  <text class="cell" x="650" y="178" fill="#2ecc71">R/W (Read/Write)</text>
  <text class="cell-s" x="650" y="195" fill="#6a8a6a">Turing domain</text>

  <text class="cell" x="850" y="183" fill="#f39c12">0 cycles</text>
  <text class="cell-s" x="850" y="201" fill="#8899aa">already in register</text>

  <line x1="170" y1="183" x2="220" y2="183" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="330" y1="183" x2="375" y2="183" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Row 3: Application → LAMBDA instruction -->
  <rect x="30" y="235" width="920" height="80" rx="0" fill="#0f1520" stroke="#1a2a3a" stroke-width="0.5"/>

  <rect x="50" y="248" width="120" height="40" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="cell-b" x="110" y="263" fill="#c39bd3">Application</text>
  <text class="cell-s" x="110" y="278" fill="#c39bd3">(f x)</text>

  <text class="cell mono" x="280" y="268" fill="#c39bd3">(&#955;x.M) N</text>
  <text class="cell-s" x="280" y="286" fill="#8899aa">"apply f to arg"</text>

  <rect x="370" y="248" width="160" height="40" rx="6" fill="#0f3a1a" stroke="#2ecc71" stroke-width="2"/>
  <text class="cell-b mono" x="450" y="263" fill="#2ecc71">LAMBDA CRn, x</text>
  <text class="cell-s" x="450" y="278" fill="#2ecc71">the instruction</text>

  <text class="cell" x="650" y="263" fill="#2ecc71">X checked on CRn</text>
  <text class="cell-s" x="650" y="280" fill="#6a8a6a">bridges Church → Turing</text>

  <text class="cell" x="850" y="263" fill="#2ecc71">~1 cycle</text>
  <text class="cell-s" x="850" y="281" fill="#8899aa">machine status only</text>

  <line x1="170" y1="268" x2="220" y2="268" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ah-g)"/>
  <line x1="330" y1="268" x2="370" y2="268" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ah-g)"/>

  <!-- Row 4: Substitution → Code body execution -->
  <rect x="30" y="320" width="920" height="80" rx="0" fill="#0d1220" stroke="#1a2a3a" stroke-width="0.5"/>

  <rect x="50" y="333" width="120" height="40" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="cell-b" x="110" y="348" fill="#c39bd3">Substitution</text>
  <text class="cell-s" x="110" y="363" fill="#c39bd3">(M[x:=N])</text>

  <text class="cell mono" x="280" y="353" fill="#c39bd3">M[x:=N]</text>
  <text class="cell-s" x="280" y="371" fill="#8899aa">"replace x with N"</text>

  <rect x="375" y="333" width="150" height="40" rx="6" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="cell-b" x="450" y="348" fill="#5dade2">Code Body</text>
  <text class="cell-s" x="450" y="363" fill="#5dade2">executes at CR14+x</text>

  <text class="cell" x="650" y="348" fill="#2ecc71">X (in scope)</text>
  <text class="cell-s" x="650" y="365" fill="#6a8a6a">DRn supplies the value</text>

  <text class="cell" x="850" y="348" fill="#f39c12">N cycles</text>
  <text class="cell-s" x="850" y="366" fill="#8899aa">body instruction count</text>

  <line x1="170" y1="353" x2="220" y2="353" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="330" y1="353" x2="375" y2="353" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Row 5: Result → Data Register (result) -->
  <rect x="30" y="405" width="920" height="80" rx="0" fill="#0f1520" stroke="#1a2a3a" stroke-width="0.5"/>

  <rect x="50" y="418" width="120" height="40" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="cell-b" x="110" y="433" fill="#c39bd3">Result</text>
  <text class="cell-s" x="110" y="448" fill="#c39bd3">(value)</text>

  <text class="cell mono" x="280" y="438" fill="#c39bd3">&#946;-reduction</text>
  <text class="cell-s" x="280" y="456" fill="#8899aa">"computed value"</text>

  <rect x="375" y="418" width="150" height="40" rx="6" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="cell-b" x="450" y="433" fill="#5dade2">Data Register</text>
  <text class="cell-s" x="450" y="448" fill="#5dade2">DRn (result)</text>

  <text class="cell" x="650" y="433" fill="#2ecc71">R/W (Read/Write)</text>
  <text class="cell-s" x="650" y="450" fill="#6a8a6a">Turing domain</text>

  <text class="cell" x="850" y="438" fill="#f39c12">0 cycles</text>
  <text class="cell-s" x="850" y="456" fill="#8899aa">result in register</text>

  <line x1="170" y1="438" x2="220" y2="438" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="330" y1="438" x2="375" y2="438" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ========== CONCRETE EXAMPLE ========== -->

  <rect x="30" y="510" width="920" height="200" rx="10" fill="#0f1520" stroke="#f5c842" stroke-width="1.5"/>
  <text class="ph" x="490" y="535" text-anchor="middle" fill="#f5c842">CONCRETE EXAMPLE: (&#955;x. x+1) 5 &#8594; 6</text>

  <!-- Lambda calculus side -->
  <rect x="55" y="555" width="400" height="140" rx="8" fill="#1a0f1a" stroke="#c39bd3" stroke-width="1"/>
  <text class="col-hdr" x="255" y="575" fill="#c39bd3">Lambda Calculus</text>

  <text class="cell mono" x="80" y="600" fill="#c39bd3" text-anchor="start" font-size="14">(&#955;x. x+1) 5</text>

  <text class="note" x="80" y="625" fill="#8899aa">&#955;x      = bind parameter x</text>
  <text class="note" x="80" y="643" fill="#8899aa">x+1     = body (add 1 to x)</text>
  <text class="note" x="80" y="661" fill="#8899aa">5       = argument (substituted for x)</text>
  <text class="note" x="80" y="679" fill="#8899aa">result  = 6 (&#946;-reduced value)</text>

  <!-- Arrow -->
  <line x1="460" y1="625" x2="510" y2="625" stroke="#f5c842" stroke-width="2" marker-end="url(#ah-y)"/>
  <text class="cell-s" x="485" y="612" fill="#f5c842">maps to</text>

  <!-- CTMM hardware side -->
  <rect x="515" y="555" width="420" height="140" rx="8" fill="#0f1a2a" stroke="#5dade2" stroke-width="1"/>
  <text class="col-hdr" x="725" y="575" fill="#5dade2">CTMM Hardware</text>

  <text class="cell mono" x="540" y="600" fill="#2ecc71" text-anchor="start" font-size="13">MOV  DR0, #5        ; x = 5</text>
  <text class="cell mono" x="540" y="620" fill="#2ecc71" text-anchor="start" font-size="13">LAMBDA CR2, addOne  ; apply &#955;</text>
  <text class="cell mono" x="540" y="640" fill="#8899aa" text-anchor="start" font-size="13">; -- body at offset addOne --</text>
  <text class="cell mono" x="540" y="660" fill="#5dade2" text-anchor="start" font-size="13">ADD  DR0, DR0, #1   ; x+1</text>
  <text class="cell mono" x="540" y="680" fill="#5dade2" text-anchor="start" font-size="13">RETURN              ; DR0 = 6</text>

  <!-- ========== DOMAIN BRIDGE DIAGRAM ========== -->

  <text class="ph" x="490" y="740" text-anchor="middle" fill="#f5c842">DOMAIN BRIDGE</text>
  <text class="cell-s" x="490" y="758" fill="#8899aa">LAMBDA bridges Church (capability) and Turing (computation) domains</text>

  <!-- Church domain box -->
  <rect x="80" y="775" width="260" height="120" rx="10" fill="#1a0f1a" stroke="#c39bd3" stroke-width="2"/>
  <text class="col-hdr" x="210" y="798" fill="#c39bd3">Church Domain</text>
  <text class="cell" x="210" y="822" fill="#c8d6e5">Golden Tokens (GTs)</text>
  <text class="cell" x="210" y="842" fill="#c8d6e5">Capabilities &amp; permissions</text>
  <text class="cell-s" x="210" y="862" fill="#8899aa">L (Load), S (Save), E (Enter)</text>
  <text class="cell-s" x="210" y="880" fill="#c39bd3">CR0-CR7 hold GTs</text>

  <!-- LAMBDA bridge -->
  <rect x="380" y="800" width="220" height="70" rx="10" fill="#0f3a1a" stroke="#2ecc71" stroke-width="2"/>
  <text class="col-hdr mono" x="490" y="825" fill="#2ecc71">LAMBDA CRn, x</text>
  <text class="cell" x="490" y="847" fill="#c8d6e5">X permission = bridge</text>
  <text class="cell-s" x="490" y="862" fill="#2ecc71">~1 cycle, no stack</text>

  <!-- Arrows -->
  <line x1="340" y1="835" x2="380" y2="835" stroke="#c39bd3" stroke-width="2" marker-end="url(#ah-g)"/>
  <text class="cell-s" x="360" y="825" fill="#c39bd3">GT</text>

  <line x1="600" y1="835" x2="640" y2="835" stroke="#2ecc71" stroke-width="2" marker-end="url(#ah)"/>
  <text class="cell-s" x="620" y="825" fill="#2ecc71">exec</text>

  <!-- Turing domain box -->
  <rect x="640" y="775" width="260" height="120" rx="10" fill="#0f1a2a" stroke="#5dade2" stroke-width="2"/>
  <text class="col-hdr" x="770" y="798" fill="#5dade2">Turing Domain</text>
  <text class="cell" x="770" y="822" fill="#c8d6e5">Data values &amp; computation</text>
  <text class="cell" x="770" y="842" fill="#c8d6e5">Arithmetic, logic, flow</text>
  <text class="cell-s" x="770" y="862" fill="#8899aa">R (Read), W (Write), X (Execute)</text>
  <text class="cell-s" x="770" y="880" fill="#5dade2">DR0-DR15 hold values</text>

</svg>

</body>
</html>
