  <text class="lt" x="60" y="1145" fill="#e74c3c" font-size="13" font-weight="bold">Phase 1 guarantees clean slate (Claim 2a):</text>
  <text class="lt" x="60" y="1165" fill="#555555" font-size="12">Every CR set to NULL type (10). Every DR zeroed. Every flag cleared. No residual state from previous</text>
  <text class="lt" x="60" y="1183" fill="#555555" font-size="12">execution. A FAULT at any point during execution returns the machine to Phase 1 — total restart.</text>

  <text class="lt" x="60" y="1208" fill="#f5c842" font-size="13" font-weight="bold">One hardwired GT — the bootstrap chicken-and-egg:</text>
  <text class="lt" x="60" y="1228" fill="#555555" font-size="12">CR15 (Namespace root) cannot be loaded via mLoad because mLoad needs the Namespace to validate MACs.</text>
  <text class="lt" x="60" y="1246" fill="#555555" font-size="12">This single hardwired GT is the only exception. Every subsequent load goes through mLoad validation.</text>

  <text class="lt" x="60" y="1271" fill="#2ecc71" font-size="13" font-weight="bold">Strict ordering guarantees safety:</text>
  <text class="lt" x="60" y="1291" fill="#555555" font-size="12">Phase 2 must complete before Phase 3 (Thread needs Namespace). Phase 3 before Phase 4 (Nucleus needs</text>
  <text class="lt" x="60" y="1309" fill="#555555" font-size="12">Thread context). Each phase builds on the previous, and any failure at any point faults back to Phase 1.</text>
